<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Vocab Trainer 3.1</title>

<style>
body{font-family:Arial;background:#eef2f7;max-width:900px;margin:20px auto}
.box{background:#fff;padding:20px;border-radius:10px}
input,button,textarea,select{padding:8px;font-size:16px}
#q{font-size:34px;font-weight:bold;margin:20px 0}
table{width:100%;border-collapse:collapse;margin-top:15px}
td,th{border:1px solid #ccc;padding:4px}
textarea{width:100%;height:80px;margin-top:10px}
</style>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#eef2f7">
</head>

<body>
<div class="box">

<h2>Vocab Trainer 3.1</h2>

<select id="lists" onchange="switchList()"></select>
<input id="newList" placeholder="Nueva lista">
<button onclick="addList()">Crear lista</button>
<button onclick="deleteList()">Eliminar lista actual</button>

<label style="margin-left:15px;">Modo: 
<select id="studyMode" onchange="changeMode()">
<option value="random">🎲 Aleatorio</option>
<option value="alpha">🔤 Alfabético</option>
</select>
</label>

<hr>

<input id="es" placeholder="Español">
<input id="it" placeholder="Italiano">
<button onclick="add()">Añadir palabra</button>

<h4>Añadir desde texto (es;it por línea)</h4>
<textarea id="bulk" placeholder="hola;ciao&#10;adiós;arrivederci"></textarea>
<button onclick="addBulk()">Añadir texto</button>

<hr>

<div id="q"></div>
<input id="ans" placeholder="Respuesta">
<button onclick="check()">Comprobar</button>
<button onclick="next()">Siguiente</button>

<div id="fb"></div>

<p>Aciertos <span id="o">0</span> | Fallos <span id="k">0</span></p>

<table>
<thead><tr><th>Español</th><th>Italiano</th><th></th></tr></thead>
<tbody id="t"></tbody>
</table>

</div>

<script>

/* =======================
   ESTADO GLOBAL
======================= */

let db = JSON.parse(localStorage.vocabDB || "{}");
let current = localStorage.currentList || "default";

if(!db[current]) db[current] = [];

let words = db[current];
let ok = +localStorage.ok || 0;
let ko = +localStorage.ko || 0;
let mode = localStorage.studyMode || "random"; // Persistencia del modo

let c = null;
let alphaIndex = 0; // Índice para el modo alfabético
let bag = [];

/* =======================
   UTILIDADES
======================= */

// Centraliza la ordenación alfabética por español de forma nativa
function sortWords() {
    words.sort((a, b) => a.es.localeCompare(b.es, 'es', { sensitivity: 'base' }));
}

/* =======================
   SAVE
======================= */

function save(){
db[current] = words;
localStorage.vocabDB = JSON.stringify(db);
localStorage.currentList = current;
localStorage.ok = ok;
localStorage.ko = ko;
localStorage.studyMode = mode; // Guardar el modo actual
render();
}

/* =======================
   RENDER
======================= */

function render(){
o.textContent = ok;
k.textContent = ko;
studyMode.value = mode;

t.innerHTML = "";

// Aseguramos que se visualicen ordenadas en la tabla
sortWords();

words.forEach((w,i)=>{
t.innerHTML += `
<tr>
<td contenteditable onblur="ed(${i},0,this.innerText)">${w.es}</td>
<td contenteditable onblur="ed(${i},1,this.innerText)">${w.it}</td>
<td><button onclick="del(${i})">X</button></td>
</tr>`;
});

renderLists();
}

/* =======================
   LISTAS
======================= */

function renderLists(){
lists.innerHTML = "";

Object.keys(db).forEach(name=>{
let opt = document.createElement("option");
opt.value = name;
opt.textContent = name;
if(name == current) opt.selected = true;
lists.appendChild(opt);
});
}

function switchList(){
current = lists.value;
words = db[current] || [];
resetProgress();
save();
next();
}

function addList(){
let name = newList.value.trim();
if(!name || db[name]) return;

db[name] = [];
newList.value = "";

save();
render();
}

function deleteList(){
if(!confirm("¿Eliminar la lista actual?")) return;

delete db[current];

let keys = Object.keys(db);

if(keys.length){
current = keys[0];
words = db[current];
}else{
current = "default";
db[current] = [];
words = db[current];
}

resetProgress();
save();
render();
next();
}

/* =======================
   CRUD PALABRAS
======================= */

function ed(i,f,v){
if(f==0) words[i].es = v.trim();
else words[i].it = v.trim();
resetProgress(); // Limpiamos ciclos al alterar datos directamente
save();
}

function del(i){
words.splice(i,1);
resetProgress();
save();
}

function add(){
if(!es.value || !it.value) return;

words.push({es:es.value.trim(), it:it.value.trim()});

es.value = "";
it.value = "";

resetProgress();
save();
}

function addBulk(){
let lines = bulk.value.split(/\n/);

lines.forEach(l=>{
let p = l.split(/[;,]/);
if(p.length < 2) return;

let e = p[0].trim();
let i = p[1].trim();

if(!words.some(w=>w.es==e && w.it==i)){
    words.push({es:e,it:i});
}
});

bulk.value = "";
resetProgress();
save();
}

/* =======================
   MECÁNICAS DE JUEGO & MODOS
======================= */

function resetProgress(){
bag = [];
alphaIndex = 0;
}

function changeMode(){
mode = studyMode.value;
resetProgress();
save();
next();
}

function refillBag(){
bag = [...words];
for(let i = bag.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [bag[i], bag[j]] = [bag[j], bag[i]];
}
}

function pickRandom(){
if(bag.length === 0) refillBag();
return bag.pop();
}

function pickAlphabetical(){
sortWords();
if(alphaIndex >= words.length || alphaIndex < 0) {
    alphaIndex = 0;
}
let picked = words[alphaIndex];
alphaIndex++;
return picked;
}

/* =======================
   TEST
======================= */

function next(){
if(!words.length){
    q.textContent = "Sin palabras";
    c = null;
    return;
}

if(mode === "alpha"){
    c = pickAlphabetical();
} else {
    c = pickRandom();
}

q.textContent = c.es;
ans.value = "";
fb.textContent = "";
ans.focus();
}

function check(){
if(!c) return;

let a = ans.value.trim().toLowerCase();
let b = c.it.toLowerCase();

if(a == b){
ok++;
fb.textContent = "✔ Correcto";
}else{
ko++;
fb.textContent = "✘ " + c.it;
}

save();
}

ans.onkeydown = e=>{
if(e.key == "Enter"){
if(fb.textContent) next();
else check();
}
}

/* =======================
   INIT
======================= */

render();
next();

</script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
